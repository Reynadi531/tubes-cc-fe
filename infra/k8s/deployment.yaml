apiVersion: apps/v1
kind: Deployment
metadata:
  name: tubes-fe
  namespace: tubes-fe
  labels:
    app.kubernetes.io/name: tubes-fe
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: tubes-fe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tubes-fe
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: nginx
          image: tubes-fe:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      automountServiceAccountToken: false
